<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Cal+Sans&family=DM+Serif+Text:ital@0;1&family=Lexend:wght@100..900&display=swap');</style>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <title>Product Review Site</title>
</head>
<body>
<div class="container">
<div class="overlay"></div>
<h1 class="header">Your ABI Product Reviews <button onclick="logout()">Logout</button></h1>
<div id="cardContainer">
<div id="auth">
    <h2>Leaving your first review? Register here.</h2>
    <input type="text" id="regFirstName" placeholder="First Name">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPass" placeholder="Password">
    <button onclick="register()">Register</button>
</div>

<div id="login">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPass" placeholder="Password" required>
    <button onclick="login()">Login</button>
</div>
</div>

<div id="userPanel" class="hidden">
    <h2>Welcome, <span id="userName"></span>.
        Leave a new review or view your previous reviews.
    </h2>

    <h3>Leave a Review</h3>
    <input type="text" id="product" placeholder="Product"><br>
    <textarea id="review" placeholder="Your review"></textarea><br>
    <label>Rating:
        <select id="rating">
            <option value="1">1 Star</option>
            <option value="2">2 Stars</option>
            <option value="3">3 Stars</option>
            <option value="4">4 Stars</option>
            <option value="5">5 Stars</option>
        </select>
    </label><br>
    <button onclick="submitReview()">Submit</button>

<div id="previousReviewsPanel">
    <h3>Your Previous Reviews</h3>
    <ul id="reviewList"></ul>
</div>
<div class="overlay"></div>
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
